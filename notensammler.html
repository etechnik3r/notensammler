<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notensammler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; }

        body {
            background-color: #1a1a1a;
            color: #ecf0f1;
            font-family: 'VT323', 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 6px;
            box-sizing: border-box;
            height: 100dvh;
            overflow: hidden;
            user-select: none;
            touch-action: none; /* Verhindert Scrollen beim Swipen */
        }

        #header { text-align: center; }

        h1.title {
            font-family: 'Press Start 2P', 'Courier New', monospace;
            margin: 4px 0;
            font-size: clamp(14px, 4vw, 24px);
            color: #f1c40f;
            text-shadow: 3px 3px 0 #000;
            letter-spacing: 1px;
        }

        p.desc {
            margin: 2px 0 8px;
            color: #aaa;
            font-size: clamp(14px, 3vw, 19px);
            max-width: 800px;
        }

        /* Auf sehr flachen Bildschirmen (Handy quer) Beschreibung ausblenden */
        @media (max-height: 520px) {
            p.desc { display: none; }
            h1.title { font-size: 13px; margin: 2px 0; }
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4 / 3; /* Behält das 800x600 Format bei */
            border: 4px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background-color: #2c3e50;
            overflow: hidden;
            image-rendering: pixelated;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        #ui {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            flex-wrap: wrap;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid #3d566e;
            padding: 8px;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: clamp(7px, 2.2vw, 12px);
            line-height: 1.8;
        }

        .note-done { color: #555; text-decoration: line-through; }
        .note-in-net { border: 2px solid #ecf0f1; padding: 0 2px; background: rgba(255, 255, 255, 0.2); }

        .modal {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #f1c40f;
            text-align: center;
            z-index: 10;
            padding: 16px;
            box-sizing: border-box;
        }

        .modal h1, .modal h2 {
            font-family: 'Press Start 2P', 'Courier New', monospace;
            margin: 0 0 16px;
            text-shadow: 3px 3px 0 #000;
            line-height: 1.5;
        }
        .modal h1 { font-size: clamp(15px, 4.5vw, 26px); }
        .modal h2 { font-size: clamp(11px, 3.2vw, 18px); }

        .modal p {
            font-family: 'VT323', monospace;
            font-size: clamp(17px, 4.2vw, 24px);
            line-height: 1.4;
            color: #ecf0f1;
            margin: 6px 0;
        }

        .pixel-icon { image-rendering: pixelated; margin-bottom: 12px; }

        .buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 16px;
        }

        button {
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: clamp(9px, 2.4vw, 13px);
            color: white;
            background-color: #3498db;
            border: 0;
            border-radius: 0;
            padding: 14px 16px;
            cursor: pointer;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
            box-shadow: inset 4px 4px 0 0 #6cb6e8, inset -4px -4px 0 0 #1f6da8, 0 4px 0 0 #000;
        }

        button:hover { background-color: #2980b9; }
        button:active { transform: translateY(3px); box-shadow: inset 4px 4px 0 0 #6cb6e8, inset -4px -4px 0 0 #1f6da8, 0 1px 0 0 #000; }

        .btn-green { background-color: #27ae60; box-shadow: inset 4px 4px 0 0 #5fd98f, inset -4px -4px 0 0 #1d8348, 0 4px 0 0 #000; }
        .btn-green:hover { background-color: #219653; }
        .btn-green:active { box-shadow: inset 4px 4px 0 0 #5fd98f, inset -4px -4px 0 0 #1d8348, 0 1px 0 0 #000; }
    </style>

    <div id="header">
        <h1 class="title">Notensammler</h1>
        <p class="desc">Pfeiltasten oder Wischen (Touch) | Fang Noten mit dem Kescher und bring sie zum Mischpult rechts.</p>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="ui" style="display: none;">
            <div id="targetDisplay"></div>
            <div id="netDisplay">Kescher: 0</div>
        </div>

        <div id="startScreen" class="modal" style="display: flex;">
            <canvas id="startClef" class="pixel-icon"></canvas>
            <h1>Notensammler</h1>
            <h2>Was möchtest du spielen?</h2>
            <div class="buttons">
                <button onclick="startGame('target')">Melodie-Sammler</button>
                <button onclick="startGame('free')">Eigene Melodie</button>
            </div>
        </div>

        <div id="freeModeMenu" class="modal">
            <h2>Deine Noten sind im Kasten!</h2>
            <div class="buttons">
                <button onclick="playFreeMelody()">Nochmal abhören</button>
                <button onclick="continueFreeMode()">Weitersammeln</button>
                <button onclick="restartFreeMode()">Neu starten</button>
                <button class="btn-green" onclick="finishAndEvaluate()">Lied bewerten lassen</button>
            </div>
        </div>

        <div id="evalScreen" class="modal">
            <canvas id="evalCanvas" class="pixel-icon"></canvas>
            <h2 id="evalTrophy">Pokalname</h2>
            <p id="evalText" style="max-width: 600px;">Feedback Text</p>
            <div class="buttons">
                <button onclick="showStartScreen()">Zurück zum Menü</button>
            </div>
        </div>

        <div id="winScreen" class="modal">
            <canvas id="winClef" class="pixel-icon"></canvas>
            <h2>Lied komplett!</h2>
            <p>Du hast den goldenen Notenschlüssel gewonnen.</p>
            <div class="buttons">
                <button onclick="showStartScreen()">Zurück zum Menü</button>
            </div>
        </div>
    </div>

        // --- AUDIO FUNKTIONEN ---
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(note, duration = 300) {
            if (!noteFrequencies[note]) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = noteFrequencies[note];
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration / 1000);
        }

        function playError() {
            initAudio();
            const osc = audioCtx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.4);
            osc.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

            let delay = 0;
            sequence.forEach((note) => {
                setTimeout(() => { playTone(note, 400); }, delay);

        // Sprite auf ein eigenes Canvas zeichnen (für die Modal-Fenster)
        function renderSpriteToCanvas(canvasEl, sprite, palette, scale) {
            const w = Math.max(...sprite.map(r => r.length));
            canvasEl.width = w * scale;
            canvasEl.height = sprite.length * scale;
            canvasEl.style.width = canvasEl.width + 'px';
            const c = canvasEl.getContext('2d');
            c.clearRect(0, 0, canvasEl.width, canvasEl.height);
            for (let row = 0; row < sprite.length; row++) {
                for (let col = 0; col < sprite[row].length; col++) {
                    const ch = sprite[row][col];
                    if (ch !== '.') {
                        c.fillStyle = palette[ch] || '#ffffff';
                        c.fillRect(col * scale, row * scale, scale, scale);
                    }
                }
            }
        }

        // --- BEWERTUNGSLOGIK ---
        function finishAndEvaluate() {
            document.getElementById('freeModeMenu').style.display = 'none';
            let melody = gameState.freeMelody;
            let score = 0;
            let feedback = [];

            if (melody.length === 0) {
                showEvaluation(ghostTrophy, "Nanu? Du hast das Lied abgegeben, ohne Noten zu sammeln! Nächstes Mal schnappst du dir ein paar.");
                return;
            }

            let uniqueNotes = new Set(melody).size;
            let jumps = 0;
            for (let i = 1; i < melody.length; i++) {
                if (melody[i] !== melody[i-1]) jumps++;
            }

            // Kriterium 1: Länge (max 40 Pkt)
            if (melody.length < 5) {
                score += 10; feedback.push("Dein Lied ist noch etwas kurz geraten.");
            } else if (melody.length <= 15) {
                score += 25; feedback.push("Das Lied hat eine richtig schöne Länge zum Mitsummen.");
            } else {
                score += 40; feedback.push("Wahnsinn, du hast ein riesiges Meisterwerk komponiert!");
            }

            // Kriterium 2: Abwechslung (max 35 Pkt)
            if (uniqueNotes === 1) {
                score += 5; feedback.push("Du hast immer nur denselben Ton gespielt. Misch beim nächsten Mal ein paar bunte Töne dazu!");
            } else if (uniqueNotes <= 3) {
                score += 20; feedback.push("Du hast schon verschiedene Töne gemischt, das klingt gut.");
            } else {
                score += 35; feedback.push("Super abwechslungsreich! Du hast fast alle Tasten benutzt.");
            }

            // Kriterium 3: Sprünge (max 25 Pkt)
            if (jumps > 0 && jumps < melody.length / 2) {
                score += 10;
            } else if (jumps >= melody.length / 2) {
                score += 25; feedback.push("Dein Lied hüpft richtig toll rauf und runter. Das macht Spaß!");
            }

            // Zufälligen Pokal aus der erreichten Stufe ziehen
            let pool;
            if (score < 30) pool = trophyPools.tier1;
            else if (score < 60) pool = trophyPools.tier2;
            else if (score < 85) pool = trophyPools.tier3;
            else pool = trophyPools.tier4;

            let result = pool[Math.floor(Math.random() * pool.length)];
            showEvaluation(result, feedback.join(" "));
        }

        function showEvaluation(trophy, text) {
            document.getElementById('evalTrophy').innerText = trophy.name;
            document.getElementById('evalText').innerText = text;
            renderSpriteToCanvas(document.getElementById('evalCanvas'), trophySprites[trophy.sprite], trophy.pal, 9);
            document.getElementById('evalScreen').style.display = 'flex';
        }

        // --- MENÜ ---
        function showStartScreen() {
            document.getElementById('winScreen').style.display = 'none';
            document.getElementById('freeModeMenu').style.display = 'none';
            document.getElementById('evalScreen').style.display = 'none';
            document.getElementById('ui').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.mode = 'menu';
            gameState.isPaused = true;
        }

        function startGame(mode) {
            initAudio();
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';

            gameState.mode = mode;
            gameState.isPaused = false;
            gameState.currentProgress = 0;
            gameState.freeMelody = [];
            player.net = [];
            player.x = 350;
            player.prevX = 350;
            fallingItems = [];
            particles = [];

            if (mode === 'target') {
                let song = songDB[Math.floor(Math.random() * songDB.length)];
                gameState.targetMelodyName = song.title;
                gameState.targetMelody = [...song.notes];
            }
        }

        function continueFreeMode() {
            document.getElementById('freeModeMenu').style.display = 'none';
            gameState.isPaused = false;
            player.x -= 100;
            player.prevX = player.x;
        }

        function restartFreeMode() {
            document.getElementById('freeModeMenu').style.display = 'none';
            gameState.freeMelody = [];
            player.net = [];
            gameState.isPaused = false;
            player.x -= 100;
            player.prevX = player.x;
        }

        // --- SPAWN & KOLLISION ---
        function checkIntersection(rect1, rect2) {
            return (rect1.x < rect2.x + rect2.w &&
                    rect1.x + rect1.w > rect2.x &&
                    rect1.y < rect2.y + rect2.h &&
                    rect1.h + rect1.y > rect2.y);
        }

        function spawnItem() {
            const isObstacle = Math.random() < 0.15;
            let type = isObstacle ? 'lightning' : (Math.random() < 0.5 ? 'noteSingle' : 'noteDouble');
            let noteVal = possibleNotes[Math.floor(Math.random() * possibleNotes.length)];

            // Noten fallen nicht über das Mischpult (Begrenzung der X-Koordinate)
            let maxSpawnX = mixBox.x - 50;

            fallingItems.push({
                x: Math.random() * maxSpawnX,
                y: -50,
                width: 40, height: 36,
                speed: 1.5 + Math.random() * 3.0,
                isObstacle: isObstacle,
                type: type,
                note: isObstacle ? null : noteVal,
                color: isObstacle ? '#f1c40f' : noteColors[noteVal]
            });
        }

        function spawnBurst(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: -Math.random() * 3 - 1,
                    life: 25 + Math.random() * 10,
                    color: color
                });
            }
        }

        // Position des Kescher-Korbs relativ zum Spieler
        function getNetPos() {
            const flip = player.direction === -1;
            const netX = flip ? player.x - netWidth - 10 : player.x + player.width + 10;
            const netY = player.y - 36;
            return { netX, netY, flip };
        }

        // --- UPDATE ---
        function update() {
            if (gameState.isPaused) return;

            if (player.stunTimer > 0) {
                player.stunTimer--;
                player.dx = 0;
            }

            player.x += player.dx;
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // Laufanimation: Schrittweite aus tatsächlicher Bewegung (Tastatur UND Touch)
            const moved = Math.abs(player.x - player.prevX);
            if (moved > 0.5) player.walkCycle += moved;
            player.prevX = player.x;

            if (Math.random() < 0.035) spawnItem();

            const { netX, netY } = getNetPos();
            let playerRect = { x: player.x, y: player.y, w: player.width, h: player.height };
            let netRect = { x: netX, y: netY, w: netWidth, h: netHeight };

            for (let i = fallingItems.length - 1; i >= 0; i--) {
                let item = fallingItems[i];
                item.y += item.speed;

                if (item.y > canvas.height) {
                    fallingItems.splice(i, 1);
                    continue;
                }

                let itemRect = { x: item.x, y: item.y, w: item.width, h: item.height };

                let hitPlayer = checkIntersection(itemRect, playerRect);
                let hitNet = checkIntersection(itemRect, netRect);

                if (item.isObstacle && (hitPlayer || hitNet)) {
                    // Blitz trifft Spieler oder Kescher -> Alles zurücksetzen
                    player.net = [];
                    player.stunTimer = 60;
                    playError();
                    fallingItems.splice(i, 1);
                } else if (!item.isObstacle && hitNet) {
                    // Note trifft NUR den Kescher (kein Limit mehr!)
                    player.net.push(item.note);
                    playTone(item.note, 100);
                    spawnBurst(item.x + item.width / 2, item.y + item.height / 2, item.color);
                    fallingItems.splice(i, 1);
                }
            }

            // Funkel-Partikel updaten
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // --- MISCHPULT ABGABE ---
            if (player.x + player.width > mixBox.x && player.y + player.height > mixBox.y && player.net.length > 0) {
                if (gameState.mode === 'target') {
                    let addedAny = false;
                    while (gameState.currentProgress < gameState.targetMelody.length) {
                        let requiredNote = gameState.targetMelody[gameState.currentProgress];
                        let noteIndexInNet = player.net.indexOf(requiredNote);

                        if (noteIndexInNet !== -1) {
                            player.net.splice(noteIndexInNet, 1);
                            gameState.currentProgress++;
                            addedAny = true;
                        } else { break; }
                    }

                    if (addedAny) {
                        playTone(gameState.targetMelody[gameState.currentProgress - 1], 400);
                        if (gameState.currentProgress >= gameState.targetMelody.length) {
                            gameState.isPaused = true;
                            playSequence(gameState.targetMelody, () => {
                                document.getElementById('winScreen').style.display = 'flex';
                            });
                        }
                    } else {
                        player.net = [];
                        playError();
                    }

                } else if (gameState.mode === 'free') {
                    gameState.freeMelody.push(...player.net);
                    player.net = [];
                    gameState.isPaused = true;
                    document.getElementById('freeModeMenu').style.display = 'flex';
                    playFreeMelody();
                }
            }

            if (Math.random() < 0.2) {
                for(let i=0; i<gameState.equalizerBars.length; i++) gameState.equalizerBars[i] = 5 + Math.random() * 30;
            }

            updateUI();
        }

        function updateUI() {
            const targetDisplay = document.getElementById('targetDisplay');
            const netDisplay = document.getElementById('netDisplay');

            if (gameState.mode === 'target') {
                let html = `<strong>${gameState.targetMelodyName}:</strong> `;
                let tempNet = [...player.net];

                for (let i = 0; i < gameState.targetMelody.length; i++) {
                    let note = gameState.targetMelody[i];
                    if (i < gameState.currentProgress) {
                        html += `<span class="note-done">${note}</span> `;
                    } else {
                        let idx = tempNet.indexOf(note);
                        if (idx !== -1) {
                            html += `<span class="note-in-net" style="color: ${noteColors[note]};">${note}</span> `;
                            tempNet.splice(idx, 1);
                        } else {
                            html += `<span style="color: ${noteColors[note]};">${note}</span> `;
                        }
                    }
                }
                targetDisplay.innerHTML = html;
            } else if (gameState.mode === 'free') {
                targetDisplay.innerHTML = `<strong>Eigene Melodie:</strong> ${gameState.freeMelody.length} Noten abgegeben`;
            }

            netDisplay.innerText = `Kescher: ${player.net.length} ♪`;
        }

        // --- ZEICHNEN ---
        function drawSprite(x, y, spriteArray, palette, flip = false) {
            ctx.save();
            ctx.translate(x, y);
            if (flip) {
                ctx.scale(-1, 1);
                ctx.translate(-spriteArray[0].length * spriteScale, 0);
            }
            for (let row = 0; row < spriteArray.length; row++) {
                for (let col = 0; col < spriteArray[row].length; col++) {
                    const char = spriteArray[row][col];
                    if (char !== '.') {
                        ctx.fillStyle = palette[char] || '#ffffff';
                        ctx.fillRect(col * spriteScale, row * spriteScale, spriteScale, spriteScale);
                    }
                }
            }
            ctx.restore();
        }

        function drawBackground() {
            const t = Date.now() / 1000;

            // Bühnen-Himmel
            ctx.fillStyle = '#2c3e50'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Funkelnde Sterne
            for (const s of stars) {
                const tw = 0.4 + 0.6 * Math.abs(Math.sin(t * 1.5 + s.phase));
                ctx.globalAlpha = tw;
                ctx.fillStyle = '#f7f1d5';
                ctx.fillRect(s.x, s.y, s.size, s.size);
            }
            ctx.globalAlpha = 1;

            // Scheinwerferkegel
            ctx.globalAlpha = 0.07;
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath(); ctx.moveTo(150, 0); ctx.lineTo(40, 500); ctx.lineTo(260, 500); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(650, 0); ctx.lineTo(540, 500); ctx.lineTo(760, 500); ctx.closePath(); ctx.fill();
            ctx.globalAlpha = 1;

            // Bühnenboden mit Kachelmuster
            ctx.fillStyle = '#1a252f'; ctx.fillRect(0, 500, canvas.width, 100);
            for (let tx = 0; tx < canvas.width; tx += 50) {
                for (let ty = 500; ty < canvas.height; ty += 50) {
                    if (((tx / 50) + (ty / 50)) % 2 === 0) {
                        ctx.fillStyle = '#202d3a';
                        ctx.fillRect(tx, ty, 50, 50);
                    }
                }
            }
            ctx.fillStyle = '#3d566e'; ctx.fillRect(0, 500, canvas.width, 4); // Bühnenkante

            // Lautsprecherboxen
            for (const sp of [{x:50, y:200, h:300}, {x:600, y:200, h:250}]) {
                ctx.fillStyle = '#0e1620'; ctx.fillRect(sp.x, sp.y, 100, sp.h);
                ctx.strokeStyle = '#3d566e'; ctx.lineWidth = 4;
                ctx.strokeRect(sp.x + 2, sp.y + 2, 96, sp.h - 4);
                // Membranen
                for (const m of [{cy: sp.y + 80, r: 30}, {cy: sp.y + sp.h - 80, r: 40}]) {
                    ctx.fillStyle = '#39495c';
                    ctx.beginPath(); ctx.arc(sp.x + 50, m.cy, m.r, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#202b36';
                    ctx.beginPath(); ctx.arc(sp.x + 50, m.cy, m.r - 8, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#566573';
                    ctx.beginPath(); ctx.arc(sp.x + 50, m.cy, 6, 0, Math.PI*2); ctx.fill();
                }
            }

            // Equalizer-Anzeige (bunte Balken)
            const barColors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#e74c3c','#2ecc71'];
            ctx.fillStyle = '#000'; ctx.fillRect(300, 300, 200, 100);
            ctx.strokeStyle = '#3d566e'; ctx.lineWidth = 3; ctx.strokeRect(300, 300, 200, 100);
            for(let i=0; i<gameState.equalizerBars.length; i++){
                let barH = gameState.equalizerBars[i];
                ctx.fillStyle = barColors[i];
                ctx.fillRect(310 + i*23, 392 - barH, 15, barH);
            }

            // Mischpult
            ctx.fillStyle = '#34495e'; ctx.fillRect(mixBox.x, mixBox.y, mixBox.width, mixBox.height);
            ctx.fillStyle = '#7f8c8d';
            ctx.beginPath(); ctx.moveTo(mixBox.x, mixBox.y); ctx.lineTo(mixBox.x + mixBox.width, mixBox.y - 30);
            ctx.lineTo(mixBox.x + mixBox.width, mixBox.y); ctx.fill();

            for(let i=0; i<3; i++) {
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(mixBox.x + 15 + i*30, mixBox.y + 20, 10, 40);
                ctx.fillStyle = '#bdc3c7'; ctx.fillRect(mixBox.x + 10 + i*30, mixBox.y + 40, 20, 10);
            }
            // Blinkende LED + Beschriftung
            ctx.fillStyle = Math.floor(t * 2) % 2 === 0 ? '#2ecc71' : '#145a32';
            ctx.fillRect(mixBox.x + 10, mixBox.y + 75, 8, 8);
            ctx.fillStyle = '#f1c40f';
            ctx.font = '10px "Press Start 2P", monospace';
            ctx.textAlign = 'left';
            ctx.fillText('MIX', mixBox.x + 30, mixBox.y + 84);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();

            // Fallende Noten und Blitze
            for (let item of fallingItems) {
                if (item.isObstacle) {
                    drawSprite(item.x, item.y, lightningSprite, { O:'#f1c40f', C:'#fff9c4' });
                } else {
                    let sprite = item.type === 'noteSingle' ? noteSingleSprite : noteDoubleSprite;
                    drawSprite(item.x, item.y, sprite, { X: item.color, W:'#ffffff' });
                    ctx.font = '10px "Press Start 2P", monospace';
                    ctx.textAlign = 'center';
                    ctx.lineWidth = 3; ctx.strokeStyle = '#000';
                    ctx.strokeText(item.note, item.x + item.width / 2, item.y - 6);
                    ctx.fillStyle = '#fff';
                    ctx.fillText(item.note, item.x + item.width / 2, item.y - 6);
                }
            }

            // Funkel-Partikel
            for (const p of particles) {
                ctx.globalAlpha = Math.max(0, p.life / 30);
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
            }
            ctx.globalAlpha = 1;

            // Schatten unter dem Spieler
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.beginPath();
            ctx.ellipse(player.x + player.width / 2, player.y + player.height + 2, player.width / 2, 6, 0, 0, Math.PI*2);
            ctx.fill();

            // Spieler mit Laufanimation
            const flip = player.direction === -1;
            const isStunFlash = player.stunTimer > 0 && Math.floor(Date.now() / 150) % 2 === 0;
            let frame = playerFrames.idle;
            if (player.dx !== 0 || Math.abs(player.x - player.prevX) > 0.5) {
                const step = Math.floor(player.walkCycle / 18) % 4;
                frame = (step === 0 || step === 2) ? playerFrames.idle : (step === 1 ? playerFrames.walkA : playerFrames.walkB);
            }
            drawSprite(player.x, player.y, frame, isStunFlash ? stunPalette : playerPalette, flip);

            // Schwindel-Sternchen, wenn der Spieler vom Blitz getroffen wurde
            if (player.stunTimer > 0) {
                const t = Date.now() / 200;
                ctx.fillStyle = '#f1c40f';
                for (let i = 0; i < 3; i++) {
                    const ang = t + i * (Math.PI * 2 / 3);
                    ctx.fillRect(player.x + player.width / 2 + Math.cos(ang) * 22 - 2, player.y - 14 + Math.sin(ang) * 6 - 2, 5, 5);
                }
            }

            // Kescher: Holzstiel von der Hand zum Ring
            const { netX, netY } = getNetPos();
            const handX = flip ? player.x + 1.5 * spriteScale : player.x + 11.5 * spriteScale;
            const handY = player.y + 11.5 * spriteScale;
            const ringX = flip ? netX + netWidth - 8 : netX + 8;
            const ringY = netY + 18;
            ctx.strokeStyle = '#8e5a2b';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(ringX, ringY); ctx.stroke();

            // Netz selbst
            drawSprite(netX, netY, netSprite, netPalette, flip);

            // Gefangene Noten als bunte Punkte im Netz anzeigen
            const shown = Math.min(player.net.length, netDotCells.length);
            for (let i = 0; i < shown; i++) {
                const [cx, cy] = netDotCells[i];
                const cellX = flip ? (netSprite[0].length - 1 - cx) : cx;
                ctx.fillStyle = noteColors[player.net[player.net.length - 1 - i]] || '#fff';
                ctx.fillRect(netX + cellX * spriteScale, netY + cy * spriteScale, spriteScale, spriteScale);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // --- STEUERUNG ---

        // Tastatur
        document.addEventListener('keydown', (e) => {
            if (gameState.isPaused || player.stunTimer > 0) return;
            if (e.code === 'ArrowLeft') { player.dx = -player.speed; player.direction = -1; }
            if (e.code === 'ArrowRight') { player.dx = player.speed; player.direction = 1; }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' && player.dx < 0) player.dx = 0;
            if (e.code === 'ArrowRight' && player.dx > 0) player.dx = 0;
        });

        // Touch-Steuerung (Mobil)
        function handleTouch(e) {
            if (gameState.isPaused || player.stunTimer > 0) return;
            e.preventDefault(); // Verhindert Scrollen

            const rect = canvas.getBoundingClientRect();
            // Umrechnung der Touch-Position auf die interne 800x600 Auflösung
            const scaleX = canvas.width / rect.width;

            let touchX = (e.touches[0].clientX - rect.left) * scaleX;
            let targetX = touchX - player.width / 2;

            // Richtung aktualisieren basierend auf Bewegung
            if (targetX < player.x - 5) player.direction = -1;
            else if (targetX > player.x + 5) player.direction = 1;

            player.x = targetX;
        }

        canvas.addEventListener('touchstart', (e) => { initAudio(); handleTouch(e); }, {passive: false});
        canvas.addEventListener('touchmove', handleTouch, {passive: false});

        // Notenschlüssel-Icons in den Menüs zeichnen
        renderSpriteToCanvas(document.getElementById('startClef'), trophySprites.clef, { X:'#f1c40f' }, 6);
        renderSpriteToCanvas(document.getElementById('winClef'), trophySprites.clef, { X:'#f1c40f' }, 6);

        fitGame();
        gameLoop();
    </script>
